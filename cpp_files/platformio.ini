[env:nano_usbasp]
platform = atmelavr
board = nanoatmega328new
framework = arduino

upload_protocol = custom
upload_command = avrdude -C/home/lam/avrdude.conf -c usbasp -p m328p -F -U flash:w:$SOURCE:i 

lib_deps = 
    EthernetENC
    SoftwareSerial
    adafruit/Adafruit MAX31856 library@^1.2.8 

